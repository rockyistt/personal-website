<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}个人网站{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="/">Luqi Dong</a>
            </div>
            <ul class="nav-menu">
                <li><a href="/" {% if request.endpoint == 'main.index' %}class="active"{% endif %}>首页</a></li>
                <li><a href="/portfolio" {% if request.endpoint == 'portfolio.portfolio' %}class="active"{% endif %}>作品集</a></li>
                <li><a href="/about" {% if request.endpoint == 'main.about' %}class="active"{% endif %}>关于</a></li>
                <li><a href="/resume" {% if request.endpoint == 'main.resume' %}class="active"{% endif %}>简历</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024-2026 Luqi Dong. All rights reserved.</p>
            <div class="social-links">
                <a href="https://github.com" target="_blank" title="GitHub">GitHub</a>
                <a href="https://www.linkedin.com" target="_blank" title="LinkedIn">LinkedIn</a>
                <a href="mailto:l.rockydong@outlook.com" title="Email">Email</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
